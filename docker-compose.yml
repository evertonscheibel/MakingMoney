version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: gestaopro-mongodb
    ports:
      - "127.0.0.1:27018:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - gestaopro-network
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: gestaopro-backend
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/gestaopro
      - JWT_SECRET=${JWT_SECRET:-super-secret-key-change-me}
      - JWT_EXPIRES_IN=7d
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - NODE_ENV=production
      - PORT=3001
      - FRONTEND_URL=http://localhost:8080
    networks:
      - gestaopro-network
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: gestaopro-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - gestaopro-network
    restart: unless-stopped

volumes:
  mongo_data:


networks:
  gestaopro-network:
    driver: bridge
